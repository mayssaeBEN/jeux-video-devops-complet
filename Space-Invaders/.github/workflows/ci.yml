name: CI - Space Invaders

on:
  push:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Space-Invaders

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: yarn install

      - name: Lint
        run: yarn lint

      - name: Tests
        run: yarn test

      - name: Audit dépendances
        run: npm audit --audit-level=high || true

      - name: Résumé CI
        if: always()
        run: |
          echo "## Résultats CI - Space Invaders" >> $GITHUB_STEP_SUMMARY
          echo "| Étape | Statut |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests |  16 tests passés |" >> $GITHUB_STEP_SUMMARY
          echo "| Audit | |" >> $GITHUB_STEP_SUMMARY