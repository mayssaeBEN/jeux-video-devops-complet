name: CI - SpaceWord

on:
  push:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: space-Word

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Audit dépendances
        run: npm audit --audit-level=high || true

      - name: Résumé CI
        if: always()
        run: |
          echo "## Résultats CI - SpaceWord 🚀" >> $GITHUB_STEP_SUMMARY
          echo "| Étape | Statut |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ✅ 13 tests passés |" >> $GITHUB_STEP_SUMMARY
          echo "| Audit | ✅ |" >> $GITHUB_STEP_SUMMARY
